name: edu AppImage

# Personal "Franken-build" of ossia/score.
# Integrates the latest upstream/master with all origin/edu/* feature branches
# and produces a single Linux x86_64 AppImage, published to the `edu-build`
# release on this fork. Lives ONLY on the orphan `edu-build` branch so that
# syncing `master` to upstream can never delete or conflict with it.
#
# Trigger: manual (workflow_dispatch) or via the local pre-push hook on edu/*.
# Merge policy: alphabetical branch order, FAIL-FAST on conflict.

on:
  workflow_dispatch:
    inputs:
      branch_filter:
        description: "Which edu/* branches to include"
        type: choice
        default: all
        options:
          - all          # every origin/edu/* branch
          - open-prs     # only edu/* branches with an OPEN PR on upstream

permissions:
  contents: write

concurrency:
  group: edu-appimage
  cancel-in-progress: true

jobs:
  edu-appimage:
    name: edu AppImage (x86_64)
    runs-on: ubuntu-24.04
    env:
      CPU_ARCH: x86_64
      UPSTREAM_URL: https://github.com/ossia/score.git
      OUT_NAME: ossia.score-master-linux-x86_64-edu.AppImage

    steps:
      - name: Checkout edu-build (for ci/ scripts come later via reset)
        uses: actions/checkout@v6
        with:
          ref: edu-build
          fetch-depth: 0
          persist-credentials: true

      - name: Integrate upstream/master + all edu/* branches
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_FILTER: ${{ inputs.branch_filter || 'all' }}
        run: |
          set -euo pipefail
          git config user.name  "edu-build-ci"
          git config user.email "edu-build-ci@users.noreply.github.com"

          echo "::group::Fetch upstream + edu/* branches"
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || git remote set-url upstream "$UPSTREAM_URL"
          git fetch --no-tags upstream master
          # origin is this fork; grab every edu/* head
          git fetch --no-tags origin "+refs/heads/edu/*:refs/remotes/origin/edu/*" || true
          echo "::endgroup::"

          echo "::group::Reset working tree to upstream/master"
          git checkout -B edu-integration upstream/master
          git submodule update --init --recursive
          echo "::endgroup::"

          # Candidate set: every origin/edu/* head (short name, e.g. "edu/foo"),
          # alphabetical -> deterministic merge order.
          mapfile -t CANDIDATES < <(git for-each-ref \
              --format='%(refname:lstrip=3)' refs/remotes/origin/edu/ | sort)

          if [ "$BRANCH_FILTER" = "open-prs" ]; then
            echo "::group::Filter to edu/* branches with an open upstream PR"
            # Head branches of open PRs to upstream whose head repo is this fork.
            mapfile -t PR_HEADS < <(gh pr list --repo ossia/score --state open --limit 300 \
                --json headRefName,headRepositoryOwner \
                -q '.[] | select(.headRepositoryOwner.login=="edumeneses") | .headRefName' \
                | sort -u)
            echo "open-PR head branches: ${PR_HEADS[*]:-(none)}"
            BRANCHES=()
            for C in "${CANDIDATES[@]}"; do
              for H in "${PR_HEADS[@]:-}"; do
                if [ "$C" = "$H" ]; then BRANCHES+=("$C"); break; fi
              done
            done
            echo "::endgroup::"
          else
            BRANCHES=("${CANDIDATES[@]}")
          fi

          echo "Filter=$BRANCH_FILTER -> ${#BRANCHES[@]} branch(es): ${BRANCHES[*]:-(none)}"
          if [ "${#BRANCHES[@]}" -eq 0 ]; then
            echo "::warning::No matching edu/* branches — building plain upstream/master."
          fi
          # merge refs are origin/<name>; prefix them.
          BRANCHES=("${BRANCHES[@]/#/origin/}")
          for B in "${BRANCHES[@]}"; do
            echo "::group::Merge $B"
            if git merge --no-edit "$B"; then
              echo "merged $B"
            else
              echo "::error::Merge conflict while merging '$B' onto the integration branch. Aborting (fail-fast)."
              git merge --abort || true
              exit 1
            fi
            echo "::endgroup::"
          done

          # edu/* branches may bump submodules; refresh.
          git submodule update --init --recursive

      - name: Dependencies
        run: |
          export CPU_ARCH="$CPU_ARCH"
          ./ci/appimage.deps.sh

      - name: Build
        run: |
          export CPU_ARCH="$CPU_ARCH"
          export GITTAGNOV=master
          ./ci/appimage.build.sh

      - name: Stage AppImage
        run: |
          set -eux
          mkdir -p staging
          mv "Score.AppImage" "staging/${OUT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: edu-appimage-x86_64
          path: staging/${{ env.OUT_NAME }}

      - name: Publish to edu-build release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: edu-build
          name: "edu custom build"
          body: "Personal integration build of ossia score: latest upstream/master + all edu/* feature branches. Linux x86_64 only. Auto-overwritten on every run."
          append_body: false
          generate_release_notes: false
          files: |
            staging/${{ env.OUT_NAME }}
