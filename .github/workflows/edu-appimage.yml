name: edu AppImage

# Personal "Franken-build" of ossia/score.
#
# Default mode tracks the OPEN PULL REQUESTS I have on upstream (ossia/score):
# it merges each PR's head branch onto the latest upstream/master and builds a
# single Linux x86_64 AppImage, published to the `edu-build` release on this
# fork. Runs on a schedule so contributing a PR upstream is enough — no need to
# touch the fork to trigger a build.
#
# Lives ONLY on the orphan `edu-build` branch (the fork's default branch) so
# syncing `master` to upstream can never delete or conflict with it.
#
# Modes (branch_filter):
#   open-prs (default) -> branches that are head of an open PR I opened to ossia/score
#   all                -> every origin/edu/* branch on this fork (local WIP testing)

on:
  workflow_dispatch:
    inputs:
      branch_filter:
        description: "Which branches to include"
        type: choice
        default: open-prs
        options:
          - open-prs   # head branches of my open PRs to ossia/score
          - all        # every origin/edu/* branch on the fork
      force:
        description: "Rebuild even if nothing changed"
        type: boolean
        default: false
  schedule:
    - cron: '0 */3 * * *'   # every 3h; skips quickly when nothing changed

permissions:
  contents: write

concurrency:
  group: edu-appimage
  cancel-in-progress: true

env:
  UPSTREAM: ossia/score
  FORK: edumeneses/score
  CPU_ARCH: x86_64
  OUT_NAME: ossia.score-master-linux-x86_64-edu.AppImage
  STATE_NAME: edu-build-state.txt

jobs:
  edu-appimage:
    name: edu AppImage (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout edu-build
        uses: actions/checkout@v6
        with:
          ref: edu-build
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve sources, detect change, integrate
        id: integrate
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_FILTER: ${{ inputs.branch_filter || 'open-prs' }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail
          git config user.name  "edu-build-ci"
          git config user.email "edu-build-ci@users.noreply.github.com"

          echo "::group::Fetch upstream/master"
          git remote add upstream "https://github.com/${UPSTREAM}.git" 2>/dev/null \
            || git remote set-url upstream "https://github.com/${UPSTREAM}.git"
          git fetch --no-tags upstream master
          echo "::endgroup::"

          # --- Resolve the merge refs ------------------------------------------
          # MERGE_REFS = local refs to merge onto upstream/master, in order.
          echo "::group::Resolve refs (filter=$BRANCH_FILTER)"
          declare -a MERGE_REFS=()
          if [ "$BRANCH_FILTER" = "all" ]; then
            # Every edu/* branch on the fork (origin). Local WIP testing.
            git fetch --no-tags origin "+refs/heads/edu/*:refs/remotes/origin/edu/*" || true
            mapfile -t NAMES < <(git for-each-ref \
                --format='%(refname:lstrip=3)' refs/remotes/origin/edu/ | sort)
            for N in "${NAMES[@]:-}"; do
              [ -n "$N" ] && MERGE_REFS+=("origin/${N}")
            done
          else
            # All open PRs on upstream authored by edumeneses. The base repo
            # exposes every PR at refs/pull/<N>/head regardless of where the head
            # branch lives (an upstream branch or a fork), so a number-based
            # fetch is robust. Merge in ascending PR-number order.
            mapfile -t PRS < <(gh pr list --repo "$UPSTREAM" --state open \
                --author edumeneses --limit 300 --json number -q '.[].number' \
                | sort -n)
            for P in "${PRS[@]:-}"; do
              [ -n "$P" ] || continue
              git fetch --no-tags upstream "refs/pull/${P}/head:refs/remotes/pr/${P}"
              MERGE_REFS+=("pr/${P}")
            done
          fi
          echo "merge refs (${#MERGE_REFS[@]}): ${MERGE_REFS[*]:-(none)}"
          echo "::endgroup::"

          # --- Change detection -------------------------------------------------
          echo "::group::Compute build state"
          {
            echo "filter=$BRANCH_FILTER"
            echo "upstream/master=$(git rev-parse upstream/master)"
            for R in "${MERGE_REFS[@]:-}"; do
              [ -n "$R" ] || continue
              echo "${R}=$(git rev-parse "$R")"
            done
          } | sort > "$RUNNER_TEMP/new-state.txt"
          NEW_HASH=$(sha256sum "$RUNNER_TEMP/new-state.txt" | cut -d' ' -f1)
          echo "new state hash: $NEW_HASH"

          PREV_HASH=""
          if gh release download edu-build --repo "$FORK" \
               --pattern "$STATE_NAME" --dir "$RUNNER_TEMP" --clobber 2>/dev/null; then
            PREV_HASH=$(sha256sum "$RUNNER_TEMP/$STATE_NAME" | cut -d' ' -f1) || PREV_HASH=""
          fi
          echo "prev state hash: ${PREV_HASH:-(none)}"
          echo "::endgroup::"

          if [ "$NEW_HASH" = "$PREV_HASH" ] && [ "$FORCE" != "true" ]; then
            echo "No change since last build (and force=false). Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Persist the state file so the stage step can publish it.
          cp "$RUNNER_TEMP/new-state.txt" "$RUNNER_TEMP/$STATE_NAME"

          # --- Integrate: reset to upstream/master, merge branches (fail-fast) --
          echo "::group::Reset to upstream/master"
          git checkout -B edu-integration upstream/master
          git submodule update --init --recursive
          echo "::endgroup::"

          for R in "${MERGE_REFS[@]:-}"; do
            [ -n "$R" ] || continue
            echo "::group::Merge $R"
            if git merge --no-edit "$R"; then
              echo "merged $R"
            else
              echo "::error::Merge conflict on '$R'. Aborting (fail-fast). Rebase that PR on upstream/master and retry."
              git merge --abort || true
              exit 1
            fi
            echo "::endgroup::"
          done
          git submodule update --init --recursive

      - name: Dependencies
        if: steps.integrate.outputs.skip != 'true'
        run: ./ci/appimage.deps.sh

      - name: Build
        if: steps.integrate.outputs.skip != 'true'
        run: |
          export GITTAGNOV=master
          ./ci/appimage.build.sh

      - name: Stage artifacts
        if: steps.integrate.outputs.skip != 'true'
        run: |
          set -eux
          mkdir -p staging
          mv "Score.AppImage" "staging/${OUT_NAME}"
          cp "$RUNNER_TEMP/${STATE_NAME}" "staging/${STATE_NAME}"

      - name: Upload artifact
        if: steps.integrate.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: edu-appimage-x86_64
          path: staging/${{ env.OUT_NAME }}

      - name: Publish to edu-build release
        if: steps.integrate.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: edu-build
          name: "edu custom build"
          body: "Personal integration build of ossia score: latest upstream/master + my open-PR branches. Linux x86_64 only. Auto-rebuilt on change."
          append_body: false
          generate_release_notes: false
          files: |
            staging/${{ env.OUT_NAME }}
            staging/${{ env.STATE_NAME }}
